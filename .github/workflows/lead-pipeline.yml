name: Lead Intelligence Pipeline

# Runs daily to process and report on new leads from Supabase
# Can be extended to send Slack/email notifications via secrets
on:
  schedule:
    - cron: '0 9 * * *'   # Every day at 09:00 UTC
  workflow_dispatch:

jobs:
  lead-report:
    name: Daily Lead Summary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lead summary report
        run: npx tsx scripts/lead-report.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Report complete
        if: always()
        run: |
          echo "::notice::Lead pipeline report completed"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
